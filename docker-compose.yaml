version: '3.9'

services:
  xey_invest:
    build:
      context: .
      dockerfile: Dockerfile
    image: xey_invest:1.0
    ports:
      - "8000:8000"           
    restart: always
    environment:
      - DATABASE_URL=postgresql://xey_user:Xeyinvest01.@db:5432/xey_invest  
      - SECRET_KEY=5dc183b9ccc051cdf324decfa0c5422595ff97585a77df7058ba6ecb8eea645a
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    restart: always
    environment:
      - POSTGRES_USER=xey_user
      - POSTGRES_PASSWORD=Xeyinvest01.
      - POSTGRES_DB=xey_invest
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2-alpine
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:   